server:
  host: 0.0.0.0
  port: 8080
  publicURL: http://localhost:8080

repository:
  source: /workspace/demo

auth:
  oidcIssuer: http://oidc.localhost:18888
  oidcClientID: runtask
  oidcClientSecret: secret
  noAuth: false
  sessionSecret: change-this-for-shared-dev
  # default: {} (empty means any authenticated user is allowed)
  allowUsers: {}
  # default: {} (empty means no admin users)
  adminUsers:
    role:
      - admin
  apiTokens:
    enabled: true
    # default: 720
    defaultTTLHours: 720
    # default: 10
    maxPerUser: 10
    store:
      backend: object
      object:
        endpoint: http://rustfs:9000
        bucket: runtask-tokens
        region: us-east-1
        accessKey: rustfsadmin
        secretKey: rustfsadmin
        prefix: runtask/demo
        forcePathStyle: true

# default: top-level branches only when omitted
branches:
  - main
  - dev
  - work

tasks:
  build:
    artifacts:
      - path: dist
        # default: zip
        format: zip
        # default: artifacts.zip
        nameTemplate: frontend-{branch}-b{buildno}-{yyyymmdd}-{hhmmss}-{hash}.zip
    preRunTask:
      - command: npm
        args:
          - ci
        cwd: ${workspaceFolder}
    # default: false
    worktree:
      disabled: false
  test:
    preRunTask:
      - command: npm
        args:
          - ci
        cwd: ${workspaceFolder}
  lint:
    preRunTask:
      - command: npm
        args:
          - ci
        cwd: ${workspaceFolder}
  show-input: {}
  no-checkout-demo:
    worktree:
      disabled: true
  scheduled-log:
    schedules:
      - cron: "*/10 * * * *"
        branch: main
    artifacts:
      - path: dist/scheduled-run.txt
        format: file
  demo-parallel: {}
  demo-sequence: {}
  demo-mixed: {}

execution:
  # default: 4, 0 means unlimited
  maxParallelRuns: 2

metrics:
  # default: true
  enabled: true
  # default: 5
  cpuInterval: 5
  # default: 15
  memoryInterval: 15
  # default: 60
  storageInterval: 60
  # default: 300
  memoryHistoryWindow: 300

storage:
  backend: object
  # default: OS temp dir based staging when backend=object
  # default: 100
  historyKeepCount: 50
  object:
    endpoint: http://rustfs:9000
    bucket: runtask
    # default: us-east-1
    region: us-east-1
    accessKey: rustfsadmin
    secretKey: rustfsadmin
    prefix: runtask
    forcePathStyle: true
  worktree:
    # default: 0
    keepOnSuccess: 0
    # default: 3
    keepOnFailure: 2
