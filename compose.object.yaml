services:
  oidcld:
    image: ghcr.io/shibukawa/oidcld:latest
    command:
      - serve
      - --config
      - /app/config/oidcld.yaml
      - --port
      - "18888"
    ports:
      - "18888:18888"
    volumes:
      - ./oidcld.yaml:/app/config/oidcld.yaml:ro
      - ./oidcld-login-info.md:/app/config/oidcld-login-info.md:ro
    environment:
      OIDCLD_CONFIG: /app/config/oidcld.yaml
    healthcheck:
      test: ["CMD", "oidcld", "health", "--url", "http://localhost:18888"]
      interval: 5s
      timeout: 5s
      retries: 10

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      # Local-only single drive layout. Redundancy and availability are intentionally disabled.
      RUSTFS_VOLUMES: /data/rustfs0
    volumes:
      - rustfs-data:/data
      - rustfs-logs:/logs
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sS http://localhost:9000/ >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20

  rustfs-init:
    image: amazon/aws-cli:2.31.15
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        until aws --endpoint-url http://rustfs:9000 s3api list-buckets >/dev/null 2>&1; do
          sleep 2
        done
        for bucket in runtask runtask-tokens; do
          aws --endpoint-url http://rustfs:9000 s3api create-bucket --bucket "$$bucket" || true
        done
    environment:
      AWS_ACCESS_KEY_ID: rustfsadmin
      AWS_SECRET_ACCESS_KEY: rustfsadmin
      AWS_REGION: us-east-1
    depends_on:
      rustfs:
        condition: service_healthy

  runtask-ui:
    build:
      context: .
      target: web-runtime
    command:
      - ui
      - --config
      - /app/config/runtask-ui.object.yaml
    working_dir: /app
    environment:
      RUNTASK_EPHEMERAL_EMULATION_IDLE: 1m
    ports:
      - "8080:8080"
    volumes:
      - ./runtask-ui.object.yaml:/app/config/runtask-ui.object.yaml:ro
      - runtask-repos:/var/lib/runtask/repos
    extra_hosts:
      - "oidc.localhost:host-gateway"
    depends_on:
      oidcld:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully

volumes:
  runtask-repos:
  rustfs-data:
  rustfs-logs:
