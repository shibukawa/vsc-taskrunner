name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

env:
  BINARY_NAME: runtask
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: Prepare metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          ext=""
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            ext=".exe"
          fi
          asset_base="${BINARY_NAME}_${version}_${{ matrix.goos }}_${{ matrix.goarch }}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "binary=${BINARY_NAME}${ext}" >> "$GITHUB_OUTPUT"
          echo "asset_base=${asset_base}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist/${{ matrix.goos }}-${{ matrix.goarch }}
          go build -trimpath -ldflags="-s -w" -o dist/${{ matrix.goos }}-${{ matrix.goarch }}/${{ steps.meta.outputs.binary }} ./cmd/runtask

      - name: Package tarball
        if: matrix.archive == 'tar.gz'
        run: |
          tar -C dist/${{ matrix.goos }}-${{ matrix.goarch }} -czf dist/${{ steps.meta.outputs.asset_base }}.tar.gz ${{ steps.meta.outputs.binary }}

      - name: Package zip
        if: matrix.archive == 'zip'
        run: |
          cd dist/${{ matrix.goos }}-${{ matrix.goarch }}
          zip -9 ../${{ steps.meta.outputs.asset_base }}.zip ${{ steps.meta.outputs.binary }}

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.asset_base }}
          path: dist/${{ steps.meta.outputs.asset_base }}.${{ matrix.archive }}

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          shasum -a 256 *.tar.gz *.zip > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt

  docker:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}